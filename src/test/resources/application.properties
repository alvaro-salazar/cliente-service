# ── Propiedades requeridas por el controlador ──────────────────────────────
api.version=v1
app.version=test

# ── JPA: crear y destruir esquema en cada ejecución de pruebas ─────────────
# Hibernate crea las tablas al inicio y las elimina al terminar
spring.jpa.hibernate.ddl-auto=create-drop

# ── Desactivar import.sql de producción ────────────────────────────────────
# Sin esto, los 12 clientes y 8 regiones del import.sql de producción
# se cargarían en los tests y harían las pruebas impredecibles
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# ── HiKari: evitar warnings de conexiones cerradas al apagar el contenedor ──
# Testcontainers cierra Postgres antes de que HiKari libere el pool;
# acortar max-lifetime reduce la ventana de validaciones fallidas en shutdown
spring.datasource.hikari.max-lifetime=60000
