# ── Servidor HTTP ─────────────────────────────────────────────────────────────
server.port=8080

# ── Version de la API ─────────────────────────────────────────────────────────
api.version=v1

# ── Conexion a PostgreSQL ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/curso_springboot
spring.datasource.username=devdb
spring.datasource.password=a1b2c3d4
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# create-drop: crea las tablas al iniciar, las borra al apagar
spring.jpa.hibernate.ddl-auto=create-drop

# Muestra el SQL que genera Hibernate en la consola (util para aprender)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
