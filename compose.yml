services:

  # ── Base de datos PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: curso_springboot_db
    environment:
      POSTGRES_DB: curso_springboot
      POSTGRES_USER: ${DB_USERNAME:-devdb}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-a1b2c3d4}
    ports:
      - "5433:5432"   # 5433 en tu máquina → 5432 dentro del contenedor
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-devdb} -d curso_springboot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Aplicación Spring Boot ────────────────────────────────────────────────
  app:
    build: .
    ports:
      - "8080:8080"   # API REST
      - "8081:8081"   # Actuator
    environment:
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/curso_springboot}
      DB_USERNAME: ${DB_USERNAME:-devdb}
      DB_PASSWORD: ${DB_PASSWORD:-a1b2c3d4}
      JPA_DDL: ${JPA_DDL:-create-drop}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
